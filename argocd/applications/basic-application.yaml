apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grade-submission
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/vinothkumar24091996/argocd-kubernetes-gitops-tutorial.git # URL of the GIT repository
    targetRevision: HEAD
    path: gitops/basic # Path to the deployment manifest in the repository
  destination:
    server: https://kubernetes.default.svc
    namespace: deployment # Namespace to deploy the application
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
